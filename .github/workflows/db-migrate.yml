name: Database Migration

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Migration target'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write

jobs:
  validate-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Validate migration SQL
        run: |
          for file in supabase/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              if ! grep -q "^--" "$file" && grep -q ";" "$file"; then
                echo "✓ $file validated"
              else
                echo "✗ $file validation failed"
                exit 1
              fi
            fi
          done

      - name: Check for irreversible changes
        run: |
          for file in supabase/migrations/*.sql; do
            if [ -f "$file" ]; then
              if grep -qi "DROP TABLE\|DROP COLUMN\|DELETE FROM\|TRUNCATE" "$file"; then
                echo "⚠ Warning: Irreversible changes detected in $file"
              fi
            fi
          done

  dry-run-staging:
    needs: validate-migration
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Dry-run migration on staging
        run: |
          supabase migration list --project-ref ${{ secrets.SUPABASE_PROJECT_ID_STAGING }} \
            --db-url ${{ secrets.SUPABASE_DB_URL_STAGING }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  apply-production:
    needs: dry-run-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      deployment-branch: main
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Apply migration to production
        run: |
          echo "Applying migrations to production database..."
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PRODUCTION }} \
            --db-url ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Database migration completed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Database Migration Successful*\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_PRODUCTION }}
