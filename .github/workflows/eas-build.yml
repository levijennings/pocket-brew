name: EAS Build

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options:
          - development
          - preview
          - production

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ ios, android ]
    environment: eas-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.profile }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            PROFILE="production"
          else
            PROFILE="preview"
          fi
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

      - name: Bump version (production only)
        if: steps.profile.outputs.profile == 'production'
        run: |
          npm install -g semver
          CURRENT_VERSION=$(jq -r '.version' app.json)
          NEW_VERSION=$(semver bump patch $CURRENT_VERSION)
          jq --arg version "$NEW_VERSION" '.version = $version' app.json > app.json.tmp && mv app.json.tmp app.json
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add app.json
          git commit -m "Bump version to $NEW_VERSION"

      - name: Build for iOS
        if: matrix.platform == 'ios'
        run: |
          eas build --platform ios --profile ${{ steps.profile.outputs.profile }} --non-interactive
        env:
          EAS_BUILD_PROFILE: ${{ steps.profile.outputs.profile }}

      - name: Build for Android
        if: matrix.platform == 'android'
        run: |
          eas build --platform android --profile ${{ steps.profile.outputs.profile }} --non-interactive
        env:
          EAS_BUILD_PROFILE: ${{ steps.profile.outputs.profile }}

      - name: Upload to TestFlight (iOS production)
        if: matrix.platform == 'ios' && steps.profile.outputs.profile == 'production'
        run: |
          eas submit --platform ios --non-interactive --wait
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Play Console (Android production)
        if: matrix.platform == 'android' && steps.profile.outputs.profile == 'production'
        run: |
          eas submit --platform android --non-interactive --wait
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "EAS build completed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*EAS Build Successful*\nPlatform: ${{ matrix.platform }}\nProfile: ${{ steps.profile.outputs.profile }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_BUILDS }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "EAS build failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*EAS Build Failed*\nPlatform: ${{ matrix.platform }}\nProfile: ${{ steps.profile.outputs.profile }}\nCheck <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_BUILDS }}
